<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{page.title}} | {{site.name}}</title>
  <meta name="description" content="{{page.description}}">
  
  <link rel="preload" href="/style.css" as="style">
  {{{head_inject}}}
  {{{json_ld}}}
  {{{cms_data}}}
</head>
<body class="bg-white text-gray-900 antialiased selection:bg-brand-blue selection:text-white flex flex-col min-h-screen">

  <header class="gsap-header sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
      <a href="/" class="font-serif text-2xl font-bold tracking-tight text-gray-900">
          {{site.name}}
      </a>
      <a href="/" class="text-sm font-medium text-gray-500 hover:text-brand-blue transition-colors flex items-center gap-2">
        &larr; Back to all posts
      </a>
    </div>
  </header>

  <main class="flex-1 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-16 w-full">
    <article id="post-container" class="prose prose-lg max-w-none prose-headings:font-serif prose-headings:text-gray-900 prose-a:text-brand-blue hover:prose-a:text-opacity-80 prose-img:rounded-xl prose-img:shadow-sm">
      {{{static_post_content}}}
    </article>
  </main>

  <footer class="border-t border-gray-200 mt-auto bg-white py-10">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-gray-500">
      &copy; <script>document.write(new Date().getFullYear())</script> {{site.name}}.
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      gsap.fromTo(".gsap-header", { y: -20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, ease: "power3.out" });
      gsap.fromTo("#post-container", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, delay: 0.2, ease: "power3.out" });
    });
  </script>
</body>
</html>
