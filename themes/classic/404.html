<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | 404</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { brand: { blue: '#201c87', light: '#f5f5f5' } }
                }
            }
        }
    </script>
</head>
<body class="bg-white text-gray-900 antialiased flex flex-col min-h-screen selection:bg-brand-blue selection:text-white">
    <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="/" class="font-serif text-2xl font-bold tracking-tight text-gray-900">My Blog</a>
            <nav class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="/" class="text-gray-600 hover:text-gray-900">Home</a>
            </nav>
        </div>
    </header>
    <main class="flex-grow flex flex-col items-center justify-center px-4 text-center">
        <h1 class="font-serif text-9xl font-extrabold text-gray-100 mb-2">404</h1>
        <h2 class="font-serif text-3xl font-bold text-gray-900 mt-4 mb-3">Page Not Found</h2>
        <p class="text-gray-500 mb-8 max-w-md">The article or page you are looking for does not exist or may have been moved.</p>
        <a href="/" class="px-8 py-3 bg-brand-blue text-white font-medium rounded-full hover:bg-opacity-90 hover:scale-105 transition-all duration-300 shadow-sm hover:shadow-md">Return Home</a>
    </main>
    <footer class="border-t border-gray-200 bg-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-center text-sm text-gray-500">
            &copy; 2024 My Tech Blog.
        </div>
    </footer>
</body>
</html>
