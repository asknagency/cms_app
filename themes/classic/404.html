<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | 404</title>
    
    <link rel="stylesheet" href="/style.css">
    {{head_inject}}
</head>
<body class="bg-brand-surface text-brand-text antialiased flex flex-col min-h-screen selection:bg-brand-primary selection:text-white font-sans">
    <header class="sticky top-0 z-50 bg-brand-surface/95 backdrop-blur-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="/" class="font-serif text-2xl font-bold tracking-tight text-brand-text">My Blog</a>
            <nav class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="/" class="text-brand-text opacity-80 hover:opacity-100 transition-opacity">Home</a>
            </nav>
        </div>
    </header>
    <main class="flex-grow flex flex-col items-center justify-center px-4 text-center">
        <h1 class="font-serif text-9xl font-extrabold text-brand-text mb-2 opacity-20">404</h1>
        <h2 class="font-serif text-3xl font-bold text-brand-text mt-4 mb-3">Page Not Found</h2>
        <p class="text-brand-text opacity-70 mb-8 max-w-md">The article or page you are looking for does not exist or may have been moved.</p>
        <a href="/" class="px-8 py-3 bg-brand-primary text-white font-medium rounded-full hover:opacity-90 transition-all duration-300 shadow-sm hover:shadow-md">Return Home</a>
    </main>
    <footer class="border-t border-gray-200 bg-brand-surface">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-center text-sm text-brand-text opacity-70">
            &copy; 2024 My Tech Blog.
        </div>
    </footer>
</body>
</html>
